apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kidring-broker
  namespace: kidring
spec:
  selector:
    matchLabels:
      app: kidring-broker
  template:
    metadata:
      labels:
        app: kidring-broker
    spec:
      serviceAccountName: kidring-broker
      containers:
      - name: broker
        image: kidring-broker:latest
        ports:
        - containerPort: 8080
        env:
        - name: BROKER_ISSUER
          valueFrom:
            configMapKeyRef:
              name: kidring-broker-config
              key: issuer
        - name: BROKER_REGISTRY_URL
          valueFrom:
            configMapKeyRef:
              name: kidring-broker-config
              key: registry_url
        - name: BROKER_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: kidring-broker-auth
              key: token
        - name: BROKER_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
